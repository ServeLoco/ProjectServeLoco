# Nginx config for the Lightsail instance.
# Copy to: /etc/nginx/sites-available/serveloco  then symlink into sites-enabled.
# Serves 3 subdomains from ONE server:
#   api.serveloco.app    -> reverse proxy to the Node API on localhost:3000
#   admin.serveloco.app  -> static admin build
#   app.serveloco.app    -> static web PWA build
#
# HTTPS is handled by Cloudflare (proxied / orange cloud), so nginx listens on
# plain HTTP port 80. Cloudflare encrypts user<->Cloudflare automatically.

# ── API (reverse proxy + WebSocket support for Socket.IO) ───────────────
server {
    listen 80;
    server_name api.serveloco.app;

    # Allow large image uploads (matches MAX_IMAGE_SIZE_MB plus headroom)
    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Pass the real client IP through (app.js has trust proxy = 1)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (Socket.IO realtime orders)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 70s;
    }
}

# ── Admin panel (static) ────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.serveloco.app;

    root /var/www/admin;
    index index.html;

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Customer web PWA (static, service-worker aware) ─────────────────────
server {
    listen 80;
    server_name app.serveloco.app;

    root /var/www/web;
    index index.html;

    # Hashed build assets are immutable
    location /assets/ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Service worker + manifest must never be cached, or PWA updates won't ship
    location ~* (service-worker\.js|sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
