# Nginx router for the Docker Compose stack (runs INSIDE the `proxy` container).
# Routes each subdomain to the right container by its compose service name.
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose.prod.yml.

# ── api.serveloco.app -> Node API container ─────────────────────────────
server {
    listen 80;
    server_name api.serveloco.app;

    client_max_body_size 12M;   # allow image uploads

    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for Socket.IO realtime orders
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 70s;
    }
}

# ── admin.serveloco.app -> admin static container ───────────────────────
server {
    listen 80;
    server_name admin.serveloco.app;

    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── app.serveloco.app -> customer web PWA container ─────────────────────
server {
    listen 80;
    server_name app.serveloco.app;

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
