name: Deploy to AWS Lightsail

# Triggered only on push to main (not on PRs)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  # ── Run all CI checks first ──────────────────────────────────────────────────
  ci-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: serveloco_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './apps/api/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: serveloco_test
          MYSQL_USER: root
          MYSQL_PASSWORD: test
          MYSQL_SSL: false
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DATABASE: serveloco_images_test

  ci-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/admin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './apps/admin/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  ci-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './apps/web/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  ci-customer-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/customer-app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './apps/customer-app/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Deploy ONLY after ALL CI jobs pass ───────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [ci-api, ci-admin, ci-web, ci-customer-app]
    steps:
      - name: Deploy via SSH to AWS Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ProjectServeLoco
            git fetch origin
            # Treat the server as a pure deployment mirror of origin/main.
            # Any local commits or uncommitted changes on the server's main are
            # discarded automatically. This prevents silent deploy stalls when
            # someone hotfixes directly on the server and those commits never get
            # pushed back to GitHub. If you need to keep server-side hotfixes,
            # push them to GitHub first or they will be overwritten on deploy.
            git reset --hard origin/main
            # Tear down compose stack and force-remove any leftover containers/
            # networks from prior partial deploys (name conflicts otherwise).
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker rm -f \
              projectserveloco-api-1 \
              projectserveloco-web-1 \
              projectserveloco-admin-1 \
              projectserveloco-landing-1 \
              2>/dev/null || true
            docker network rm projectserveloco_default 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate --remove-orphans
