name: Play Store (VillKro customer app)

# Triggered only when the customer app changes AND only on main.
# Manual trigger is available for emergency rebuilds.
on:
  push:
    branches: ["main"]
    paths:
      - "apps/customer-app/**"
      - ".github/workflows/playstore.yml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch on a new push.
concurrency:
  group: playstore-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_DIR: apps/customer-app
  EAS_PROJECT_ID: 1df5a9bf-de34-48ea-96f4-68f598d7d318
  GRADLE_OPTS: "-Xmx1g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
  EAS_BUILD_NO_EXPO_GO_WARNING: "true"
  # Move EAS local build temp out of small tmpfs (/tmp = 7.4GB) to home (402GB free)
  TMPDIR: /home/linux-server/Documents/builds/.tmp
  EAS_LOCAL_BUILD_WORKINGDIR: /home/linux-server/Documents/builds/.tmp/eas-build
  EAS_LOCAL_BUILD_ARTIFACT_PATH: /home/linux-server/Documents/builds/.tmp/eas-build-artifact

jobs:
  # ── 1. CI gate: lint + tests must pass before we build or update. ───────────
  ci:
    name: Lint & Test
    runs-on: [self-hosted, linux, x64, villkro-android]
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v5
      # No cache: 'npm' on self-hosted — GitHub Actions cache re-downloads multi-GB
      # ~/.npm from the cloud every run (~2.5GB, often 10–20+ min). The runner already
      # keeps a local ~/.npm between jobs, so npm ci is fast without remote cache.
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          # Self-hosted: never download GitHub remote npm cache (was multi-GB / 10–20+ min).
          package-manager-cache: false
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --ci

  # ── 2. Decide whether this merge is a major (native changed) or minor. ─────
  detect-bump:
    name: Detect bump (major vs minor)
    runs-on: [self-hosted, linux, x64, villkro-android]
    needs: ci
    env:
      FORCE_MAJOR: ${{ vars.FORCE_MAJOR }}
    outputs:
      bump: ${{ steps.decide.outputs.bump }}
      message: ${{ steps.decide.outputs.message }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Determine baseline range (HEAD~1..HEAD)
        id: baseline
        run: |
          set -euo pipefail
          # Compare this commit against its immediate parent. The bump detector
          # decides major/minor from this single-commit delta.
          RANGE="HEAD~1..HEAD"
          echo "Comparing $RANGE"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Read commit messages in range
        id: msgs
        run: |
          set -euo pipefail
          MSGS="$(git log --pretty=format:'%s' ${{ steps.baseline.outputs.range }} | head -20 || true)"
          {
            echo "msgs<<EOF"
            echo "$MSGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if customer-app package.json changed
        id: pkg
        run: |
          set -euo pipefail
          CHANGED="$(git diff --name-only ${{ steps.baseline.outputs.range }} -- ${{ env.APP_DIR }}/package.json || true)"
          echo "package.json changed files: $CHANGED"
          if [ -n "$CHANGED" ]; then
            echo "pkg_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pkg_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide bump type
        id: decide
        run: |
          set -euo pipefail
          MSGS='${{ steps.msgs.outputs.msgs }}'
          PKG_CHANGED='${{ steps.pkg.outputs.pkg_changed }}'

          BUMP="minor"
          REASON="no native dep change detected"

          # Override: set the repo variable FORCE_MAJOR=true to force a major build.
          if [ "${FORCE_MAJOR:-false}" = "true" ]; then
            BUMP="major"
            REASON="FORCE_MAJOR=true set on the repo"
          fi

          # First-deploy bootstrap: check for a persistent local marker file at
          # ~/Documents/builds/.first-deploy. If it doesn't exist, force ONE
          # major build and create the marker so future runs are not "first deploy".
          # The marker lives OUTSIDE the workspace so it survives runner
          # restarts and workspace cleanups (unlike a file in the repo).
          FIRST_DEPLOY_MARKER="/home/linux-server/Documents/builds/.first-deploy"
          mkdir -p /home/linux-server/Documents/builds
          if [ ! -f "$FIRST_DEPLOY_MARKER" ]; then
            BUMP="major"
            REASON="first deploy bootstrap (.first-deploy missing -> upload .aab once)"
            touch "$FIRST_DEPLOY_MARKER"
            echo "✓ Created first-deploy marker at $FIRST_DEPLOY_MARKER"
          fi

          if [ "$PKG_CHANGED" = "true" ]; then
            BUMP="major"
            REASON="package.json changed in apps/customer-app"
          fi
          if echo "$MSGS" | grep -Eqi '^(feat|breaking)(\(.+\))?!?:'; then
            BUMP="major"
            REASON="commit prefix is feat: or BREAKING"
          fi

          echo "Decision: $BUMP ($REASON)"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          # Use heredoc to safely write multi-line commit messages with
          # special characters (parens, colons) to GITHUB_OUTPUT.
          {
            echo "message<<EOF"
            echo "$MSGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # ── 3. Build + Submit + Update on the user's Linux PC. ─────────────────────
  build-submit-update:
    name: Build / Submit / Update
    runs-on: [self-hosted, linux, x64, villkro-android]
    needs: detect-bump
    steps:
      - uses: actions/checkout@v5
      # Self-hosted: skip GitHub remote npm cache (see Lint & Test job comment).
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          # Self-hosted: never download GitHub remote npm cache (was multi-GB / 10–20+ min).
          package-manager-cache: false

      - name: Setup build directory in Documents (no /tmp usage)
        run: |
          set -euo pipefail
          # All build artifacts go to Documents/builds/.tmp — zero /tmp usage
          mkdir -p /home/linux-server/Documents/builds/.tmp
          # Symlinks: EAS CLI hardcodes /tmp paths, redirect them to Documents
          ln -sf /home/linux-server/Documents/builds/.tmp/villkro.aab /tmp/villkro.aab
          ln -sf /home/linux-server/Documents/builds/.tmp/play-store-key.json /tmp/play-store-key.json
          # Clean any leftover from previous runs
          rm -f /home/linux-server/Documents/builds/.tmp/villkro.aab
          rm -f /home/linux-server/Documents/builds/.tmp/play-store-key.json
          echo "✓ Build dir: /home/linux-server/Documents/builds/.tmp/"
          ls -la /home/linux-server/Documents/builds/.tmp/
          ls -la /tmp/villkro.aab /tmp/play-store-key.json

      - name: Install app deps
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Materialize Play Store service account key
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is empty" >&2
            exit 1
          fi
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > /home/linux-server/Documents/builds/.tmp/play-store-key.json
          ls -la /home/linux-server/Documents/builds/.tmp/play-store-key.json

      - name: Verify EAS authentication
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          # Debug: show PATH and eas location
          echo "=== Diagnostics ==="
          echo "PATH=$PATH"
          echo "eas location: $(which eas 2>&1 || echo 'NOT FOUND')"
          echo "eas version: $(eas --version 2>&1 || echo 'CANNOT RUN')"
          echo "node version: $(node --version)"
          echo "npm prefix -g: $(npm prefix -g 2>&1 || echo 'CANNOT')"
          echo "=== End diagnostics ==="
          # With EXPO_TOKEN env var set, EAS CLI authenticates automatically.
          eas whoami 2>&1 || echo "eas whoami failed"

      - name: Configure git for EAS
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

      # ─── MAJOR PATH: full .aab build + Play Store submit + OTA ────────────
      - name: Build Android .aab locally
        if: needs.detect-bump.outputs.bump == 'major'
        working-directory: ${{ env.APP_DIR }}
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_MAPBOX_PUBLIC_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_PUBLIC_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Build step diagnostics ==="
          echo "PWD=$(pwd)"
          echo "eas: $(which eas 2>&1 || echo NOT FOUND)"
          echo "node: $(which node)"
          echo "=== Starting build ==="
          # Write to Documents/builds/.tmp/villkro.aab (via symlink) — zero /tmp usage
          eas build --platform android --local --non-interactive --profile production --output /home/linux-server/Documents/builds/.tmp/villkro.aab 2>&1 | tee /home/linux-server/Documents/builds/.tmp/eas-build.log
          echo "=== Build complete, output: ==="
          ls -la /home/linux-server/Documents/builds/.tmp/villkro.aab 2>&1 || echo "NO .aab file produced"

      - name: Submit .aab to Google Play (Production track)
        if: needs.detect-bump.outputs.bump == 'major'
        working-directory: ${{ env.APP_DIR }}
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          set -euo pipefail
          # Find the .aab in Documents (zero /tmp usage)
          AAB_PATH=""
          for candidate in \
            /home/linux-server/Documents/builds/.tmp/villkro.aab \
            /home/linux-server/Documents/builds/.tmp/eas-build/build/apps/customer-app/android/app/build/outputs/bundle/release/app-release.aab; do
            if [ -f "$candidate" ]; then
              AAB_PATH="$candidate"
              break
            fi
          done
          if [ -z "$AAB_PATH" ]; then
            echo "❌ FAIL TO SUBMIT: no .aab found in Documents/builds/.tmp/"
            exit 1
          fi
          echo "Submitting .aab at: $AAB_PATH"
          # Single attempt only — no retries. Fails fast and loud if EAS flakes.
          eas submit --platform android --path "$AAB_PATH" --non-interactive
          echo "✓ Submit succeeded"

      # ─── MINOR PATH: skip the build, just publish the OTA ──────────────────
      - name: Publish EAS Update (production channel)
        working-directory: ${{ env.APP_DIR }}
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_MAPBOX_PUBLIC_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_PUBLIC_TOKEN }}
        run: |
          MSG=$(printf '%s' '${{ needs.detect-bump.outputs.message }}' | head -1)
          if [ -z "$MSG" ]; then MSG="auto-update from main"; fi
          eas update --branch production --message "$MSG" --non-interactive

      - name: Clean up service account key
        if: always()
        run: rm -f /home/linux-server/Documents/builds/.tmp/play-store-key.json

      # ─── ARCHIVE BUILD ARTIFACT ────────────────────────────────────────────────
      # Always run after build (success or failure) to preserve the latest .aab.
      # Uses `test -f` instead of `hashFiles` because hashFiles is evaluated at
      # JOB START before the .aab is created — would always be empty.
      # Zero /tmp usage — everything stays in Documents/builds/
      - name: Archive .aab to Documents/builds
        if: always()
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./${{ env.APP_DIR }}/app.json').expo.version" 2>/dev/null || echo "1.0.0")
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ARCHIVE="/home/linux-server/Documents/builds/villkro-${VERSION}-${TIMESTAMP}.aab"

          # Find the .aab in Documents (never in /tmp)
          AAB=""
          for candidate in \
            /home/linux-server/Documents/builds/.tmp/villkro.aab \
            /home/linux-server/Documents/builds/.tmp/eas-build/build/apps/customer-app/android/app/build/outputs/bundle/release/app-release.aab; do
            if [ -f "$candidate" ]; then
              AAB="$candidate"
              break
            fi
          done

          if [ -z "$AAB" ]; then
            echo "WARNING: no .aab found to archive (build may have failed)"
            exit 0
          fi

          cp "$AAB" "$ARCHIVE"
          echo "✓ Archived build to: $ARCHIVE"
          ls -lh "$ARCHIVE"


