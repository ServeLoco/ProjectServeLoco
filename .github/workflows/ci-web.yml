name: Web CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/web/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/web/**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/web

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './apps/web/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Build project
      run: npm run build
